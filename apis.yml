description: >-
  SoFi (Social Finance) is a digital personal finance company and federally chartered bank offering
  an integrated suite of financial products including banking (checking and savings), personal loans,
  student loan refinancing, private student loans, mortgages, home equity products, active and
  automated investing, cryptocurrency trading, and credit cards. The platform is unified through the
  SoFi app and complemented by a SoFi Plus premium membership ($10/month) that unlocks enhanced APY,
  investment matching, loan rate discounts, and unlimited financial planner access. Third-party
  integration with SoFi accounts is facilitated through open banking aggregators Plaid and Finicity
  (Mastercard Open Banking) for consumer-permissioned data access. SoFi's subsidiary Galileo Financial
  Technologies provides the underlying fintech infrastructure and white-label banking APIs used by
  major fintech brands globally. SoFi does not publish a first-party consumer-facing open-banking API;
  consumer account access is aggregator-only (Plaid, Finicity, MX, Akoya). Its real first-party public
  API surface is B2B/partner-oriented: two documented REST APIs in SoFi's public Postman workspace
  (a Partner Offer Pre-Qualification API exposing SoFi's PL/SLR underwriting model, and a Home Loan
  Affiliate Lead API), a Business Banking developer-docs project at docs.sofi.com, and the SoFi Tech
  Solutions (formerly Galileo) platform at docs.tech.sofi.com.
