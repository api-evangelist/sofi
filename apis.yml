  - aid: sofi:sofi-money-banking-api
    name: SoFi Money Banking API
    tags:
      - Banking
      - Checking
      - Savings
      - Open Banking
      - Personal Finance
    humanURL: https://www.sofi.com/banking/
    properties:
      - url: https://www.sofi.com/banking/
        type: Documentation
      - url: https://www.sofi.com/terms-of-use
        type: TermsOfService
      - url: https://www.sofi.com/privacy-policy
        type: PrivacyPolicy
    description: >-
      SoFi Money is a combined checking and savings account offering high-yield savings with SoFi Plus
      membership (4.50% APY on up to $20,000), no-fee banking, early paycheck access, and integrations
      with open banking aggregators Plaid and Finicity for third-party account connectivity, balance
      checks, transaction history, and account ownership verification.

  - aid: sofi:sofi-personal-loans-api
    name: SoFi Personal Loans API
    tags:
      - Personal Loans
      - Lending
      - Consumer Finance
      - Personal Finance
    humanURL: https://www.sofi.com/personal-loans/
    properties:
      - url: https://www.sofi.com/personal-loans/
        type: Documentation
      - url: https://www.sofi.com/personal-loans/personal-loan-rates/
        type: Documentation
      - url: https://www.sofi.com/personal-loan-calculator/
        type: Documentation
    description: >-
      SoFi Personal Loans platform providing fixed-rate personal loans starting at 6.99% APR for
      qualified borrowers. Loans from $5,000 with origination fees of 0-7% deducted from loan proceeds.
      SoFi Plus members receive an additional 0.25% rate reduction. Consumer-facing loan application
      and account management accessible via the SoFi app and web platform.

  - aid: sofi:sofi-student-loan-refinancing-api
    name: SoFi Student Loan Refinancing API
    tags:
      - Student Loans
      - Refinancing
      - Education Finance
      - Personal Finance
    humanURL: https://www.sofi.com/refinance-student-loan/
    properties:
      - url: https://www.sofi.com/refinance-student-loan/
        type: Documentation
      - url: https://www.sofi.com/private-student-loans/
        type: Documentation
    description: >-
      SoFi Student Loan Refinancing and Private Student Loan origination platform. Refinancing fixed
      rates start at 3.99% APR with autopay (0.25% autopay discount). Private student loans feature
      no origination fees, no late fees, and no insufficient funds fees. SoFi Plus members receive
      an additional 0.125% rate reduction on refinancing and private student loans.

  - aid: sofi:sofi-mortgage-api
    name: SoFi Mortgage API
    tags:
      - Mortgage
      - Home Loans
      - Real Estate
      - Lending
      - Personal Finance
    humanURL: https://www.sofi.com/mortgage/
    properties:
      - url: https://www.sofi.com/mortgage/
        type: Documentation
      - url: https://www.sofi.com/heloc/
        type: Documentation
    description: >-
      SoFi Mortgage platform for home purchase loans and refinancing, plus Home Equity Lines of Credit
      (HELOC) and home equity loans. SoFi Plus members receive a $500 additional mortgage origination
      fee discount and a $200 home equity loan discount at closing. Consumer-facing applications
      managed through the SoFi app and web platform.

  - aid: sofi:sofi-invest-api
    name: SoFi Invest API
    tags:
      - Investing
      - Stocks
      - ETFs
      - Crypto
      - Retirement
      - Personal Finance
    humanURL: https://www.sofi.com/invest/
    properties:
      - url: https://www.sofi.com/invest/
        type: Documentation
      - url: https://www.sofi.com/wealth/assets/documents/sofi-invest-fee-schedule.pdf
        type: Documentation
      - url: https://www.sofi.com/invest/ira/
        type: Documentation
    description: >-
      SoFi Invest provides active and automated investing in stocks, ETFs, fractional shares, IPOs,
      and cryptocurrency. SoFi Plus members receive a 1% match on eligible Active Invest deposits,
      1% match on eligible crypto purchases (up to $250,000 lifetime), and IPO allocation priority.
      Includes automated retirement accounts (IRA) and robo-advisor functionality.

  - aid: sofi:sofi-credit-card-api
    name: SoFi Credit Card API
    tags:
      - Credit Card
      - Payments
      - Rewards
      - Personal Finance
    humanURL: https://www.sofi.com/credit-card/
    properties:
      - url: https://www.sofi.com/credit-card/
        type: Documentation
    description: >-
      SoFi Credit Card platform with cash back rewards and the new SoFi Smart Card offering 5% cash
      back at grocery stores. SoFi Plus members receive a 10% boost on cash back rewards and 5% cash
      back on SoFi Travel bookings via the Expedia-powered travel portal. Consumer-facing account
      management and rewards redemption through the SoFi app.

