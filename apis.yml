  - aid: sofi:sofi-partner-offer-api
    name: SoFi Partner Offer Pre-Qualification API
    tags:
      - Lending
      - Personal Loans
      - Student Loan Refinancing
      - Prequalification
      - Partner API
      - United States
    humanURL: https://www.postman.com/sofi-api/team-sofi-s-public-workspace/documentation/7686555-548d8800-0df1-4783-8450-aade8b8a39e4
    baseURL: https://www.sofi.com
    properties:
      - url: openapi/sofi-partner-offer-api-openapi.yml
        type: OpenAPI
      - url: https://www.postman.com/sofi-api/team-sofi-s-public-workspace/documentation/7686555-548d8800-0df1-4783-8450-aade8b8a39e4
        type: Documentation
      - url: https://www.postman.com/sofi-api/team-sofi-s-public-workspace/collection/orw4s7j/affiliate-prequal-offers
        type: Postman
    description: >-
      SoFi's partner-offer-api (documented as Partner Offer Pre Qual V2) is a real, first-party external
      REST API that exposes SoFi's underwriting model to approved partners, returning real-time Personal
      Loan (PL) and Student Loan Refinancing (SLR) offers based on user-entered criteria via a single
      POST /po/api/v2/loan-offer/json endpoint. User-entered criteria can be saved to pre-populate a
      SoFi loan application when an offer is selected on the partner's site, and a 2021 release added
      specialty SLR handling for Medical and Dental graduate programs. Authentication is by API key /
      UUID (one per product type, PL or SLR) passed as the accountId in the JSON body, over HTTPS only;
      testing uses base URL https://dev-external-0.sofitest.com and production uses https://www.sofi.com.
      Endpoint, method, base URLs, auth model, and response codes were harvested faithfully from SoFi's
      public Postman workspace (team-sofi / sofi-api).

  - aid: sofi:sofi-home-loan-affiliate-lead-api
    name: SoFi Home Loan Affiliate Lead API
    tags:
      - Mortgage
      - Home Loans
      - Affiliate
      - Lead Generation
      - Partner API
      - United States
    humanURL: https://www.postman.com/sofi-api/team-sofi-s-public-workspace/documentation/11106810-0d3f9390-b6f2-4100-891d-977691e36fc2
    baseURL: https://www.sofi.com
    properties:
      - url: openapi/sofi-home-loan-affiliate-lead-api-openapi.yml
        type: OpenAPI
      - url: https://www.postman.com/sofi-api/team-sofi-s-public-workspace/documentation/11106810-0d3f9390-b6f2-4100-891d-977691e36fc2
        type: Documentation
      - url: https://www.postman.com/sofi-api/team-sofi-s-public-workspace/documentation/5k2lj48/home-loan-affiliate-lead-api
        type: Postman
    description: >-
      SoFi's Home Loan Affiliate Lead API is a real, first-party REST endpoint that lets approved
      affiliate partners submit home-loan leads to SoFi via POST /afpq/api/v1/affiliate/lead/home-loan.
      The documented Create Lead operation is a subset of a broader affiliate endpoint set for sending
      leads and retrieving product offerings by criteria; a successful submission (HTTP 201) returns a
      sofiAffiliateLeadId and a CREATED status that partners are advised to persist. Environment-specific
      accountId values authenticate requests (QA base https://dev-external-0.sofitest.com, production base
      https://www.sofi.com). Endpoint, method, base URLs, and response codes were harvested faithfully
      from SoFi's public Postman workspace (team-sofi / sofi-api); the source material is marked
      confidential and proprietary to Social Finance, Inc.

  - aid: sofi:sofi-business-banking-api
    name: SoFi Business Banking API
    tags:
      - Business Banking
      - Commercial Payments
      - Real-Time Payments
      - Embedded Finance
      - Sponsor Banking
      - United States
    humanURL: https://docs.sofi.com/business-banking/docs
    properties:
      - url: https://docs.sofi.com/business-banking/docs
        type: DeveloperPortal
      - url: https://www.sofi.com/business-banking/commercial/
        type: Documentation
      - url: https://investors.sofi.com/news/news-details/2026/SoFi-Launches-Big-Business-Banking-to-Power-Fiat-and-Crypto-Banking-on-a-Single-Regulated-Platform/default.aspx
        type: Documentation
    description: >-
      SoFi Business Banking (marketed as Big Business Banking) is SoFi Bank, N.A.'s API-driven commercial
      platform combining a nationally chartered bank with direct Federal Reserve access to move money in
      real time, 24/7/365, in fiat, SoFiUSD, or selected digital assets. It powers commercial payment
      services - debit, prepaid, ACH, and wire - for sponsor-banking partners, built on Galileo's
      Cyberbank Core. SoFi publishes first-party developer documentation for this platform at
      docs.sofi.com (which resolves to a ReadMe-hosted Business Banking docs project); the reference is
      HTML-only with no publicly downloadable OpenAPI/Swagger spec confirmed, so it is listed humanURL-only
      and partner onboarding is gated (bbb@sofi.org). Digital-asset capabilities are subject to legal,
      regulatory, and operational approval per SoFi's own disclosures.

  - aid: sofi:sofi-tech-solutions-platform-api
    name: SoFi Tech Solutions Platform API
    tags:
      - Banking-as-a-Service
      - Card Issuing
      - Payment Processing
      - Embedded Finance
      - Core Banking
      - United States
    humanURL: https://docs.tech.sofi.com/pro/reference/program-api-intro
    properties:
      - url: https://docs.tech.sofi.com/pro/reference/program-api-intro
        type: DeveloperPortal
      - url: https://tech.sofi.com/platform/open-apis/
        type: Documentation
      - url: https://sandbox.gpsrv.com/auth/login
        type: Sandbox
    description: >-
      SoFi Tech Solutions (formerly Galileo Financial Technologies, a SoFi company) is SoFi's B2B fintech
      platform arm, exposing cloud-native RESTful APIs - Program API (accounts, cards), Config API,
      Dispute API, Loan API, Payment Hub API, Risk/Auth APIs, Events webhooks, and External Transactions
      - across Cyberbank Core, Cyberbank Digital, Card Issuing & Payment Hub, Secured Credit, and the
      Payment Risk Platform, with 250+ documented methods and a sandbox at sandbox.gpsrv.com. It is
      surfaced here as SoFi's first-party developer platform (docs at docs.tech.sofi.com); the deep,
      one-per-resource API coverage is maintained separately in the api-evangelist/galileo-fs repository
      to avoid duplication, since this is the Galileo/SoFi Tech Solutions processor surface.

